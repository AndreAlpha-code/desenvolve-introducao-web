<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Pesquisa de Satisfação</title>
</head>
<body>

    <h1>Pesquisa de Satisfação</h1>

    <form>
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome"><br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email"><br><br>

            <label for="telefone">Telefone:</label><br>
            <input type="tel" id="telefone" name="telefone"><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Pesquisa</legend>

            <p>1. Você ficou satisfeito com o atendimento?</p>
            <input type="radio" id="sim1" name="atendimento" value="sim">
            <label for="sim1">Sim</label><br>
            <input type="radio" id="nao1" name="atendimento" value="nao">
            <label for="nao1">Não</label><br><br>

            <p>2. Você recomendaria nossa empresa?</p>
            <input type="radio" id="sim2" name="recomendaria" value="sim">
            <label for="sim2">Sim</label><br>
            <input type="radio" id="nao2" name="recomendaria" value="nao">
            <label for="nao2">Não</label><br><br>

            <label for="avaliacao">3. Como você avalia nosso serviço?</label><br>
            <select id="avaliacao" name="avaliacao">
                <option value="excelente">Excelente</option>
                <option value="bom">Bom</option>
                <option value="regular">Regular</option>
                <option value="ruim">Ruim</option>
            </select>
        </fieldset>

        <br>

        <input type="checkbox" id="autorizacao" name="autorizacao">
        <label for="autorizacao">Autorizo compartilhar minha resposta com terceiros.</label>

        <br><br>

        <button type="submit">Enviar</button>
    </form>

</body>
</html>
